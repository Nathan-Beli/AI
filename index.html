<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #1e1e2e;
            --chat-bg: #252538;
            --text-color: #cdd6f4;
            --user-msg: #89b4fa;
            --ai-msg: #45475a;
            --input-bg: #313244;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #45475a;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user {
            background-color: var(--user-msg);
            color: #11111b;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai {
            background-color: var(--ai-msg);
            color: var(--text-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        /* Style pour les blocs de code générés par l'IA */
        pre {
            background: #11111b !important;
            padding: 12px !important;
            border-radius: 8px !important;
            overflow-x: auto;
        }

        .ai img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #input-container {
            background-color: var(--chat-bg);
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #45475a;
        }

        input {
            flex: 1;
            background-color: var(--input-bg);
            border: none;
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button {
            background-color: #a6e3a1;
            color: #11111b;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #94e2d5;
        }
    </style>
</head>
<body>

    <header>🤖 IA Multimodale (Discussion, Code & Image)</header>

    <div id="chat-container">
        <div class="message ai">Bonjour ! Je suis ton modèle local sans restrictions. Pose-moi une question, demande-moi du code ou écris "Dessine..." pour générer une image.</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Posez une question ou demandez un script..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Envoyer</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    
    <script>
        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const messageText = inputField.value.trim();
            if (!messageText) return;

            appendMessage(messageText, "user");
            inputField.value = "";

            const aiMessageId = appendMessage("L'IA réfléchit...", "ai");

            try {
                const response = await fetch("http://127.0.0.1:5000/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: messageText })
                });
                
                const data = await response.json();
                const aiDiv = document.getElementById(aiMessageId);
                
                // Formater le texte et détecter les blocs de code (```)
                let formattedText = data.text.replace(/```([\s\S]*?)```/g, function(match, code) {
                    return `<pre><code class="language-javascript">${escapeHtml(code.trim())}</code></pre>`;
                });

                aiDiv.innerHTML = formattedText;
                
                // Forcer la coloration syntaxique du code
                Prism.highlightAllUnder(aiDiv);

                if (data.image) {
                    const img = document.createElement("img");
                    img.src = data.image;
                    aiDiv.appendChild(img);
                }

            } catch (error) {
                document.getElementById(aiMessageId).innerText = "Erreur de connexion avec le serveur.";
            }
        }

        function appendMessage(text, sender) {
            const container = document.getElementById("chat-container");
            const msgDiv = document.createElement("div");
            const id = "msg-" + Math.random().toString(36).substr(2, 9);
            
            msgDiv.id = id;
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
